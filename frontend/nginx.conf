server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Block ALL dotfiles (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Block sensitive file types
    location ~* \.(env|sql|log|sh|bak)$ {
        deny all;
        return 404;
    }

    # React/Vite SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy application API requests to the backend so the frontend can use
    # same-origin /api calls in production without triggering CORS preflights.
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Forward websocket traffic used by the market stream service.
    location /ws/ {
        proxy_pass http://backend:5000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
