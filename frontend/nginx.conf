server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Block ALL dotfiles (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Block sensitive file types
    location ~* \.(env|sql|log|sh|bak)$ {
        deny all;
        return 404;
    }

    # React/Vite SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}