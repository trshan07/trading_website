# docker-compose.yml

# docker-compose.yml
version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: trade_db
    environment:
      POSTGRES_DB: trade_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - trade_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: trade_db_backend
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: trade_db
      DB_USER: postgres
      DB_PASSWORD: your_password
      JWT_SECRET: your_jwt_secret_key_here
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - trade_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: trade_db_frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - trade_network

  nginx:
    image: nginx:alpine
    container_name: trade_db_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./frontend/build:/usr/share/nginx/html
    depends_on:
      - frontend
      - backend
    networks:
      - trade_network

volumes:
  postgres_data:

networks:
  trade_network:
    driver: bridge